<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Performance Region Sumatera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        #chart-container {
            position: relative;
            width: 100%;
            margin: 20px auto;
            min-height: 300px; 
        }

        h2 {
            color: white;
            background: linear-gradient(90deg, #6a1b9a, #8e24aa);
            padding: 15px;
            border-radius: 8px;
            margin-top: 0;
        }

        .filter-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            flex: 1;
            min-width: 150px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            color: white;
        }
        .reset-btn { background: #28a745; }
        .reset-btn:hover { background: #218838; }
        .back-btn { background: #dc3545; }
        .back-btn:hover { background: #c82333; }
        .print-btn { background: #6f42c1; }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background-color: #6a1b9a;
            color: white;
            padding: 12px 8px;
            position: sticky;
            top: 0;
            cursor: pointer;
            border: 1px solid #5e1689;
        }

        td {
            padding: 10px;
            border: 1px solid #eee;
            text-align: left;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }

        @media screen and (max-width: 768px) {
            .filter-container { flex-direction: column; align-items: stretch; }
            select, .btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Booking Performance Region Sumatera - April 2026</h2>
    
    <div class="filter-container">
        <select id="BranchFilter">
            <option value="">Semua Main Branch</option>
        </select>
        <select id="OfficeFilter">
            <option value="">Semua Office</option>
        </select>
        <select id="ActivityStatusFilter">
            <option value="all">Semua Aktifitas</option>
            <option value="active">Ada Aktifitas</option>
            <option value="inactive">Tidak Ada Aktifitas</option>
        </select>
        
        <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
        <button class="btn print-btn" onclick="printTable()">Print</button>
        <button class="btn back-btn" onclick="openPage()">M-Direct</button>
    </div>

    <div id="chart-container">
        <canvas id="myBarChart"></canvas>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr id="tableHead"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
const ChartDataLabels = window.ChartDataLabels;
let myChart = null;
let tableData = [];
let filteredData = [];
let currentSort = { column: null, direction: 'asc' };

// --- FUNGSI FIX: Membersihkan angka dari karakter non-numerik ---
function cleanNumber(val) {
    if (typeof val === 'number') return val;
    if (!val || val === "-" || val === "") return 0;
    // Hapus titik ribuan, ganti koma desimal jadi titik, hapus spasi/huruf
    let cleaned = val.toString().replace(/\./g, '').replace(/,/g, '.').replace(/[^0-9.-]+/g, "");
    return parseFloat(cleaned) || 0;
}

document.addEventListener('DOMContentLoaded', function() {
    fetch('Dataset.json')
        .then(res => res.json())
        .then(data => initializeDashboard(data))
        .catch(err => {
            console.warn("Dataset.json tidak ditemukan, menggunakan data demo.");
            // Data demo ditingkatkan untuk testing Bengkulu 2.2M
            const dummyData = [
                {"Main Branch": "Bengkulu", "Office": "Bengkulu KM 6", "Total": "1.100.000"},
                {"Main Branch": "Bengkulu", "Office": "Bengkulu Panorama", "Total": "1.100.000"},
                {"Main Branch": "Medan", "Office": "Medan SM Raja", "Total": "150"},
                {"Main Branch": "Palembang", "Office": "PLM Sudirman", "Total": "85"}
            ];
            initializeDashboard(dummyData);
        });
});

function initializeDashboard(data) {
    tableData = data;
    if (data.length > 0) {
        const tableHead = document.getElementById('tableHead');
        const columns = Object.keys(data[0]);
        tableHead.innerHTML = columns.map(col => `
            <th onclick="handleSort('${col}')">
                <div style="display:flex; justify-content:center; align-items:center; gap:5px;">
                    <span>${col}</span>
                    <span id="icon-${col.replace(/\s+/g, '')}" style="font-size:10px">↕</span>
                </div>
            </th>
        `).join('');
        updateMainFilters();
    }

    document.getElementById('BranchFilter').addEventListener('change', (e) => {
        updateOfficeFilter(e.target.value);
        filterAndSearchTable();
    });
    document.getElementById('OfficeFilter').addEventListener('change', filterAndSearchTable);
    document.getElementById('ActivityStatusFilter').addEventListener('change', filterAndSearchTable);
    
    filterAndSearchTable();
}

function filterAndSearchTable() {
    const branchVal = document.getElementById('BranchFilter').value;
    const officeVal = document.getElementById('OfficeFilter').value;
    const statusVal = document.getElementById('ActivityStatusFilter').value;

    filteredData = tableData.filter(row => {
        const matchBranch = !branchVal || row['Main Branch'] === branchVal;
        const matchOffice = !officeVal || row['Office'] === officeVal;
        const totalNum = cleanNumber(row['Total']);
        const matchStatus = statusVal === 'all' || 
                           (statusVal === 'active' && totalNum > 0) || 
                           (statusVal === 'inactive' && totalNum === 0);
        return matchBranch && matchOffice && matchStatus;
    });

    updateChartFromData(filteredData, branchVal);
    renderTableBody(filteredData);
}

function updateChartFromData(data, branchVal) {
    const officeMap = new Map();
    
    data.forEach(row => {
        const officeName = row['Office'];
        const val = cleanNumber(row['Total']);
        officeMap.set(officeName, (officeMap.get(officeName) || 0) + val);
    });

    let entries = Array.from(officeMap.entries()).sort((a, b) => b[1] - a[1]);
    let labels = entries.map(e => e[0]);
    let values = entries.map(e => e[1]);

    if (branchVal && values.length > 0) {
        const totalSum = values.reduce((a, b) => a + b, 0);
        labels.unshift(`TOTAL ${branchVal.toUpperCase()}`);
        values.unshift(totalSum);
    }

    drawChart({ labels, values });
}

function drawChart(data) {
    const chartContainer = document.getElementById('chart-container');
    const barHeight = 40; 
    chartContainer.style.height = ((data.labels.length * barHeight) + 100) + 'px';
    
    const ctx = document.getElementById('myBarChart').getContext('2d');
    if (myChart) myChart.destroy();
    
    myChart = new Chart(ctx, {
        type: 'bar',
        plugins: [ChartDataLabels],
        data: {
            labels: data.labels,
            datasets: [{
                data: data.values,
                backgroundColor: data.labels.map(l => l.includes('TOTAL') ? '#4E337E' : '#36A2EB'),
                barPercentage: 0.8
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            scales: { x: { display: false }, y: { grid: { display: false } } },
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: 'end', align: 'right', color: '#444', font: { weight: 'bold' },
                    formatter: (val) => val.toLocaleString('id-ID')
                }
            }
        }
    });
}

function renderTableBody(data) {
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = data.map(row => 
        `<tr>${Object.values(row).map(v => `<td>${v}</td>`).join('')}</tr>`
    ).join('');
}

function updateMainFilters() {
    const branches = [...new Set(tableData.map(d => d['Main Branch']))];
    updateFilterOptions(document.getElementById('BranchFilter'), branches, 'Semua Main Branch');
}

function updateFilterOptions(el, items, def) {
    el.innerHTML = `<option value="">${def}</option>` + 
        items.sort().map(v => `<option value="${v}">${v}</option>`).join('');
}

function updateOfficeFilter(branch) {
    const relevant = [...new Set(tableData.filter(d => !branch || d['Main Branch'] === branch).map(d => d['Office']))];
    updateFilterOptions(document.getElementById('OfficeFilter'), relevant, 'Semua Office');
}

function resetFilter() {
    document.getElementById('BranchFilter').value = "";
    document.getElementById('OfficeFilter').value = "";
    document.getElementById('ActivityStatusFilter').value = "all";
    updateMainFilters();
    filterAndSearchTable();
}

function printTable() { window.print(); }
function openPage() { window.location.href = 'https://m-direct.vercel.app/'; }

function handleSort(col) {
    currentSort.direction = (currentSort.column === col && currentSort.direction === 'asc') ? 'desc' : 'asc';
    currentSort.column = col;
    
    filteredData.sort((a, b) => {
        let valA = cleanNumber(a[col]) || a[col].toString().toLowerCase();
        let valB = cleanNumber(b[col]) || b[col].toString().toLowerCase();
        if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
        if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
        return 0;
    });
    renderTableBody(filteredData);
}
</script>
</body>
</html>
