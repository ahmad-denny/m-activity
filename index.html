<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Performance Sumatera</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; padding: 20px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 1200px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: white; background: linear-gradient(90deg, #6a1b9a, #8e24aa); padding: 15px; border-radius: 8px; text-align: center; }
        .filter-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; flex: 1; min-width: 150px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; background: #28a745; color: white; }
        button:hover { background: #218838; }
        #chart-container { position: relative; width: 100%; margin-top: 20px; }
        .table-container { margin-top: 20px; overflow-x: auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #6a1b9a; color: white; padding: 12px; border: 1px solid #ddd; position: sticky; top: 0; }
        td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h2>Booking Performance Region Sumatera</h2>
    
    <div class="filter-container">
        <select id="BranchFilter"><option value="">Semua Main Branch</option></select>
        <select id="OfficeFilter"><option value="">Semua Office</option></select>
        <button onclick="resetFilter()">Reset</button>
    </div>

    <div id="chart-container">
        <canvas id="myBarChart"></canvas>
    </div>

    <div class="table-container">
        <table>
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
let tableData = [];
let myChart = null;

// --- FUNGSI MEMBERSIHKAN KOMA RIBUAN ---
function cleanNumber(val) {
    if (typeof val === 'number') return val;
    if (!val || val === "-" || val === "") return 0;
    // Menghapus koma agar "1,038,390,113" menjadi "1038390113"
    let cleaned = val.toString().replace(/,/g, '');
    return parseFloat(cleaned) || 0;
}

// --- AMBIL DATA DARI JSON ---
document.addEventListener('DOMContentLoaded', () => {
    fetch('Dataset.json')
        .then(res => res.json())
        .then(data => {
            tableData = data;
            initDashboard();
        })
        .catch(err => {
            console.error("Gagal memuat Dataset.json:", err);
            alert("Dataset.json tidak ditemukan atau format salah.");
        });
});

function initDashboard() {
    if (tableData.length === 0) return;

    // Header Tabel
    const columns = Object.keys(tableData[0]);
    document.getElementById('tableHead').innerHTML = columns.map(c => `<th>${c}</th>`).join('');
    
    // Isi Dropdown Branch secara otomatis dari data JSON
    const branches = [...new Set(tableData.map(d => d['Main Branch']))].sort();
    const branchSelect = document.getElementById('BranchFilter');
    branchSelect.innerHTML = '<option value="">Semua Main Branch</option>' + 
        branches.map(b => `<option value="${b}">${b}</option>`).join('');
    
    // Event Listener
    document.getElementById('BranchFilter').addEventListener('change', function() {
        updateOfficeFilter(this.value);
        updateUI();
    });
    document.getElementById('OfficeFilter').addEventListener('change', updateUI);
    
    updateUI();
}

function updateOfficeFilter(selectedBranch) {
    const officeSelect = document.getElementById('OfficeFilter');
    const filteredOffices = tableData
        .filter(d => !selectedBranch || d['Main Branch'] === selectedBranch)
        .map(d => d['Office']);
    
    const offices = [...new Set(filteredOffices)].sort();
    officeSelect.innerHTML = '<option value="">Semua Office</option>' + 
        offices.map(o => `<option value="${o}">${o}</option>`).join('');
}

function updateUI() {
    const branchVal = document.getElementById('BranchFilter').value;
    const officeVal = document.getElementById('OfficeFilter').value;

    const filtered = tableData.filter(d => 
        (!branchVal || d['Main Branch'] === branchVal) && 
        (!officeVal || d['Office'] === officeVal)
    );

    // Proses data untuk Chart
    const map = {};
    filtered.forEach(d => {
        const val = cleanNumber(d['Total']);
        map[d['Office']] = (map[d['Office']] || 0) + val;
    });

    let entries = Object.entries(map).sort((a, b) => b[1] - a[1]);
    let labels = entries.map(e => e[0]);
    let values = entries.map(e => e[1]);

    // Tambahkan TOTAL Branch jika ada branch yang dipilih
    if (branchVal && values.length > 0) {
        labels.unshift("TOTAL " + branchVal);
        values.unshift(values.reduce((a, b) => a + b, 0));
    }

    renderChart(labels, values);
    renderTable(filtered);
}

function renderChart(labels, values) {
    const ctx = document.getElementById('myBarChart').getContext('2d');
    if (myChart) myChart.destroy();

    // Tinggi chart dinamis agar tidak sesak
    document.getElementById('chart-container').style.height = (labels.length * 40 + 120) + "px";

    myChart = new Chart(ctx, {
        type: 'bar',
        plugins: [ChartDataLabels],
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: labels.map(l => l.includes('TOTAL') ? '#4E337E' : '#36A2EB'),
                barPercentage: 0.7
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { right: 150 } }, // Ruang agar angka Miliar tidak terpotong
            scales: { 
                x: { display: false }, 
                y: { grid: { display: false } } 
            },
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: 'end',
                    align: 'right',
                    offset: 10,
                    color: '#000',
                    font: { weight: 'bold', size: 11 },
                    formatter: (v) => v.toLocaleString('id-ID')
                }
            }
        }
    });
}

function renderTable(data) {
    document.getElementById('tableBody').innerHTML = data.map(row => 
        `<tr>${Object.values(row).map(v => `<td>${v}</td>`).join('')}</tr>`
    ).join('');
}

function resetFilter() {
    document.getElementById('BranchFilter').value = "";
    updateOfficeFilter("");
    updateUI();
}
</script>
</body>
</html>
